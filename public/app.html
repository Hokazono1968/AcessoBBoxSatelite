<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sistema Lavanderia</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background: linear-gradient(to bottom right,#eef2ff,#f3e8ff);
  min-height:100vh;
}

.hidden{
  display:none;
}

</style>

</head>

<body class="p-4">

<div class="max-w-3xl mx-auto">

  <!-- HEADER -->

  <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">

    <h1 class="text-3xl font-bold text-center text-indigo-700">
      Sistema de Acesso à Lavanderia
    </h1>

    <p class="text-center text-gray-500 mt-2">
      Controle de acesso online
    </p>

  </div>

  <!-- MENU -->

  <div class="flex gap-4 mb-6">

    <button
      onclick="showUser()"
      class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-xl"
    >
      Área Usuário
    </button>

    <button
      onclick="showAdmin()"
      class="flex-1 bg-gray-800 hover:bg-black text-white font-bold p-4 rounded-xl"
    >
      Administração
    </button>

  </div>

  <!-- USER -->

  <div
    id="userSection"
    class="bg-white rounded-2xl shadow-xl p-6"
  >

    <h2 class="text-2xl font-bold mb-6">
      Solicitar acesso
    </h2>

    <div class="space-y-4">

      <input
        type="text"
        id="userName"
        placeholder="Nome completo"
        class="w-full border rounded-xl p-4"
      >

      <input
        type="text"
        id="userPhone"
        placeholder="(12) 99999-9999"
        maxlength="15"
        class="w-full border rounded-xl p-4"
      >

      <input
        type="text"
        id="userCPF"
        placeholder="000.000.000-00"
        maxlength="14"
        class="w-full border rounded-xl p-4"
      >

      <button
        onclick="requestAccess()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold p-4 rounded-xl"
      >
        Solicitar acesso
      </button>

    </div>

    <!-- RESULT -->

    <div
      id="accessResult"
      class="hidden mt-6 bg-green-50 border border-green-200 rounded-xl p-6"
    >

      <h3 class="text-2xl font-bold text-green-700 mb-4">
        Acesso liberado
      </h3>

      <p class="text-gray-600 mb-3">
        Senha da lavanderia:
      </p>

      <div
        id="doorPassword"
        class="text-5xl font-bold text-center text-indigo-700 bg-white rounded-xl p-4 border-2 border-dashed"
      >
        ...
      </div>

    </div>

  </div>

  <!-- ADMIN -->

  <div
    id="adminSection"
    class="hidden bg-white rounded-2xl shadow-xl p-6"
  >

    <!-- LOGIN -->

    <div id="adminLogin">

      <h2 class="text-2xl font-bold mb-6">
        Login administrativo
      </h2>

      <input
        type="password"
        id="adminPassword"
        placeholder="Senha admin"
        class="w-full border rounded-xl p-4 mb-4"
      >

      <button
        onclick="adminLogin()"
        class="w-full bg-gray-800 hover:bg-black text-white font-bold p-4 rounded-xl"
      >
        Entrar
      </button>

    </div>

    <!-- PANEL -->

    <div
      id="adminPanel"
      class="hidden"
    >

      <h2 class="text-2xl font-bold mb-6">
        Painel administrativo
      </h2>

      <!-- CURRENT PASSWORD -->

      <div class="bg-indigo-50 rounded-xl p-6 mb-6">

        <p class="text-gray-600 mb-2">
          Senha atual lavanderia
        </p>

        <div
          id="currentLaundryPassword"
          class="text-4xl font-bold text-indigo-700"
        >
          ...
        </div>

      </div>

      <!-- CHANGE PASSWORD -->

      <div class="space-y-4 mb-8">

        <input
          type="text"
          id="newLaundryPassword"
          placeholder="Nova senha lavanderia"
          class="w-full border rounded-xl p-4"
        >

        <button
          onclick="changeLaundryPassword()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-xl"
        >
          Alterar senha lavanderia
        </button>

      </div>

      <!-- ACCESS LOGS -->

      <div class="border-t pt-8">

        <h3 class="text-xl font-bold mb-4">
          Registros de acesso
        </h3>

        <div
          id="accessLogs"
          class="bg-gray-100 rounded-xl p-4 max-h-96 overflow-auto"
        >

        </div>

      </div>

    </div>

  </div>

</div>

<script>

// ======================================
// TELAS
// ======================================

function showUser(){

  document
    .getElementById("userSection")
    .classList.remove("hidden")

  document
    .getElementById("adminSection")
    .classList.add("hidden")

}

function showAdmin(){

  document
    .getElementById("userSection")
    .classList.add("hidden")

  document
    .getElementById("adminSection")
    .classList.remove("hidden")

}

// ======================================
// MASCARA CPF
// ======================================

document
.getElementById("userCPF")
.addEventListener("input", function(e){

  let value =
    e.target.value.replace(/\D/g,'')

  value =
    value.replace(/(\d{3})(\d)/,'$1.$2')

  value =
    value.replace(/(\d{3})(\d)/,'$1.$2')

  value =
    value.replace(/(\d{3})(\d{1,2})$/,'$1-$2')

  e.target.value = value

})

// ======================================
// MASCARA TELEFONE
// ======================================

document
.getElementById("userPhone")
.addEventListener("input", function(e){

  let value =
    e.target.value.replace(/\D/g,'')

  if(value.length > 10){

    value =
      value.replace(
        /^(\d{2})(\d{5})(\d{4}).*/,
        "($1) $2-$3"
      )

  } else {

    value =
      value.replace(
        /^(\d{2})(\d{4})(\d{0,4}).*/,
        "($1) $2-$3"
      )

  }

  e.target.value = value

})

// ======================================
// VALIDAR CPF
// ======================================

function validateCPF(cpf){

  cpf = cpf.replace(/[^\d]/g,'')

  if(cpf.length !== 11){
    return false
  }

  if(/^(\d)\1+$/.test(cpf)){
    return false
  }

  let sum = 0

  for(let i = 0; i < 9; i++){

    sum +=
      parseInt(cpf.charAt(i))
      * (10 - i)

  }

  let remainder =
    (sum * 10) % 11

  if(remainder === 10 || remainder === 11){
    remainder = 0
  }

  if(remainder !== parseInt(cpf.charAt(9))){
    return false
  }

  sum = 0

  for(let i = 0; i < 10; i++){

    sum +=
      parseInt(cpf.charAt(i))
      * (11 - i)

  }

  remainder =
    (sum * 10) % 11

  if(remainder === 10 || remainder === 11){
    remainder = 0
  }

  if(remainder !== parseInt(cpf.charAt(10))){
    return false
  }

  return true

}

// ======================================
// SOLICITAR ACESSO
// ======================================

async function requestAccess(){

  const name =
    document
    .getElementById("userName")
    .value
    .trim()

  const phone =
    document
    .getElementById("userPhone")
    .value
    .trim()

  const cpfInput =
    document
    .getElementById("userCPF")
    .value

  const cpf =
    cpfInput.replace(/\D/g,'')

  if(!name || !phone || !cpf){

    alert("Preencha todos os campos")
    return

  }

  if(name.length < 3){

    alert("Digite nome completo")
    return

  }

  if(phone.length < 14){

    alert("Telefone inválido")
    return

  }

  if(!validateCPF(cpf)){

    alert("CPF inválido")
    return

  }

  try{

    // salva acesso

    await fetch("/api/save-access",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        name,
        phone,
        cpf:cpfInput

      })

    })

    // pega senha

    const response =
      await fetch("/api/get-password")

    const data =
      await response.json()

    document
      .getElementById("doorPassword")
      .textContent =
      data.password

    document
      .getElementById("accessResult")
      .classList.remove("hidden")

  } catch(error){

    alert("Erro ao liberar acesso")

    console.error(error)

  }

}

// ======================================
// LOGIN ADMIN
// ======================================

async function adminLogin(){

  const password =
    document
    .getElementById("adminPassword")
    .value

  try{

    const response =
      await fetch("/api/admin-login",{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          password
        })

      })

    if(!response.ok){

      alert("Senha inválida")
      return

    }

    document
      .getElementById("adminLogin")
      .classList.add("hidden")

    document
      .getElementById("adminPanel")
      .classList.remove("hidden")

    loadAdminData()

  } catch(error){

    alert("Erro login admin")

  }

}

// ======================================
// LOAD ADMIN
// ======================================

async function loadAdminData(){

  // senha lavanderia

  const passwordResponse =
    await fetch("/api/get-password")

  const passwordData =
    await passwordResponse.json()

  document
    .getElementById("currentLaundryPassword")
    .textContent =
    passwordData.password

  // logs

  const logsResponse =
    await fetch("/api/get-access")

  const logs =
    await logsResponse.json()

  renderLogs(logs)

}

// ======================================
// ALTERAR SENHA
// ======================================

async function changeLaundryPassword(){

  const adminPassword =
    document
    .getElementById("adminPassword")
    .value

  const newPassword =
    document
    .getElementById("newLaundryPassword")
    .value

  if(!newPassword){

    alert("Digite nova senha")
    return

  }

  try{

    const response =
      await fetch("/api/change-password",{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          adminPassword,
          newPassword

        })

      })

    if(!response.ok){

      alert("Erro ao alterar senha")
      return

    }

    alert("Senha alterada")

    loadAdminData()

  } catch(error){

    alert("Erro")

  }

}

// ======================================
// RENDER LOGS
// ======================================

function renderLogs(logs){

  const container =
    document.getElementById("accessLogs")

  if(!logs.length){

    container.innerHTML =
      "<p>Nenhum acesso</p>"

    return

  }

  container.innerHTML = ""

  logs.forEach(log => {

    container.innerHTML += `

      <div class="bg-white rounded-xl p-4 mb-3">

        <p><b>Nome:</b> ${log.name}</p>

        <p><b>Telefone:</b> ${log.phone}</p>

        <p><b>CPF:</b> ${log.cpf}</p>

        <p><b>Data:</b> ${new Date(log.createdAt).toLocaleString()}</p>

      </div>

    `

  })

}

</script>

</body>
</html>
```
